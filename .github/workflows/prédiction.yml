name: Prediction IA journalière

# ✅ Déclenchement automatique tous les jours à 01h UTC
on:
  schedule:
    - cron: '0 1 * * *' # Tous les jours à 01:00 UTC
  workflow_dispatch:     # Permet de lancer manuellement

jobs:
  prediction:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_API_KEY1: ${{ secrets.GROQ_API_KEY1 }}

    steps:
      # 1️⃣ Récupération du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # 2️⃣ Configurer Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3️⃣ Installer dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 requests numpy

      # 4️⃣ 🔥 Rebase avec la branche main avant d’exécuter le script
      - name: Sync with remote main
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      # 5️⃣ Lancer le script IA
      - name: Run IA prediction script
        run: python P_Softbot.py

      # 6️⃣ Commit & push des fichiers générés
      - name: Commit & push JSON updates
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "🤖 Mise à jour des analyses IA et stats"
          branch: main
          file_pattern: "*.json"  # Ajuste si tes fichiers sont dans un sous-dossier
          push_options: "--force"